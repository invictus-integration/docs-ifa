name: Refresh search index

on:
  push:
    branches:
      - main
    paths:
      - 'versioned_sidebars/**'
      - 'versions.json'
      - 'scripts/refresh-search-index.ps1'
  schedule:
    - cron: '0 2 * * 1' # 02:00 UTC every Monday

jobs:
  refresh:
    name: Generate and push search index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run refresh-search-index.ps1
        shell: pwsh
        env:
          AZURE_SEARCH_ENDPOINT: ${{ vars.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_INDEX: ${{ vars.AZURE_SEARCH_INDEX }}
          AZURE_SEARCH_ADMIN_KEY: ${{ secrets.AZURE_SEARCH_ADMIN_KEY }}
        run: ./scripts/refresh-search-index.ps1
