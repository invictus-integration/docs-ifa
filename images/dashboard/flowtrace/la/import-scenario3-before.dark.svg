<svg xmlns="http://www.w3.org/2000/svg" width="455" height="440" viewBox="0 0 455 440"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="435" height="420" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
  <text x="227" y="37" text-anchor="middle" font-size="14" font-weight="600" fill="#F9FAFB">Before Resume</text>

  <!-- Flow (failed) -->
  <rect x="89" y="56" width="276" height="38" rx="4" fill="#881337" stroke="#FB7185" stroke-width="2"/>
  <text x="227" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#FDA4AF">Flow</text>

  <!-- Flow → Node 1 -->
  <line x1="227" y1="94" x2="227" y2="136" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 1 (success) -->
  <rect x="100" y="136" width="254" height="54" rx="4" fill="#064E3B" stroke="#34D399" stroke-width="2"/>
  <text x="227" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#6EE7B7">1</text>
  <text x="227" y="175" text-anchor="middle" font-size="11" fill="#6EE7B7">WorkFlowRunId: 111</text>

  <!-- Node 1 → Node 2 & 3 (elbows) -->
  <path d="M 227,190 L 227,214 L 115,214 L 115,236"
        stroke="#9CA3AF" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 227,190 L 227,214 L 320,214 L 320,236"
        stroke="#9CA3AF" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Node 2 (success) -->
  <rect x="20" y="236" width="190" height="68" rx="4" fill="#064E3B" stroke="#34D399" stroke-width="2"/>
  <text x="115" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#6EE7B7">2</text>
  <text x="115" y="273" text-anchor="middle" font-size="11" fill="#6EE7B7">WorkFlowRunId: 222</text>
  <text x="115" y="290" text-anchor="middle" font-size="10" fill="#A7F3D0">x-iv-parent-workflow-run-id: 111</text>

  <!-- Node 3 (success — not yet failed) -->
  <rect x="225" y="236" width="190" height="68" rx="4" fill="#064E3B" stroke="#34D399" stroke-width="2"/>
  <text x="320" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#6EE7B7">3</text>
  <text x="320" y="273" text-anchor="middle" font-size="11" fill="#6EE7B7">WorkFlowRunId: 333</text>
  <text x="320" y="290" text-anchor="middle" font-size="10" fill="#A7F3D0">x-iv-parent-workflow-run-id: 111</text>

  <!-- Node 3 → Node 4 -->
  <line x1="320" y1="304" x2="320" y2="340" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4 (failed) -->
  <rect x="225" y="340" width="190" height="68" rx="4" fill="#881337" stroke="#FB7185" stroke-width="2"/>
  <text x="320" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#FDA4AF">4</text>
  <text x="320" y="377" text-anchor="middle" font-size="11" fill="#FDA4AF">WorkFlowRunId: 444</text>
  <text x="320" y="394" text-anchor="middle" font-size="10" fill="#FECDD3">x-iv-parent-workflow-run-id: 333</text>

</svg>
