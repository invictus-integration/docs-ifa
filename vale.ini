Packages = write-good

StylesPath = .github/styles
MinAlertLevel = error
Vocab = Invictus
WordTemplate = \b(?:%s)\b

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale, write-good
BlockIgnores = (<(img|br|Tabs|Redirect|a|MvnBadge|embed|Csrf)\s[^>]+>+?), \
(?s) *(import[^\n]+;), \
(?s) *(\-\-\-.*?\-\-\-), \
(?s) *(:::[tip|note|info|danger|warning][^\n]*\n.*?:::\n)
TokenIgnores = (<(img|br|Tabs|Redirect|a|MvnBadge|embed|Csrf)\s[^\n]+>+?), \
methodology, [Vv]alidate, Multiple Revision mode, monitor(ing)?, pagination_prev, pagination_next

proselint.Diacritical = ignore